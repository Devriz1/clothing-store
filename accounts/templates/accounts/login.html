<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .login-card {
      background: #fff;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      border-radius: 14px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.6rem;
      color: #222;
    }

    .field {
      position: relative;
      margin-bottom: 1.4rem;
    }

    .field input {
      width: 100%;
      padding: 12px 40px 12px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }

    .field label {
      position: absolute;
      top: 50%;
      left: 12px;
      color: #777;
      font-size: 14px;
      pointer-events: none;
      transform: translateY(-50%);
      transition: 0.2s ease;
      background: #fff;
      padding: 0 4px;
    }

    .field input:focus,
    .field input:not(:placeholder-shown) {
      border-color: #667eea;
    }

    .field input:focus + label,
    .field input:not(:placeholder-shown) + label {
      top: -7px;
      font-size: 12px;
      color: #667eea;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 13px;
      color: #555;
    }

    .error {
      background: #ffe5e5;
      color: #c62828;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 1rem;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #5a67d8;
    }

    button.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 13px;
      color: #777;
    }

    .register-link {
      margin-top: 1rem;
      text-align: center;
      font-size: 14px;
    }

    .register-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .register-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <form method="post" class="login-card" onsubmit="handleLogin(this)">
    {% csrf_token %}

    <h2>Login</h2>

    {% if form.errors %}
      <div class="error">
        Invalid username or password.
      </div>
    {% endif %}

    <div class="field">
      <input type="text" name="username" required placeholder=" ">
      <label>Username</label>
    </div>

    <div class="field">
      <input type="password" name="password" id="password" required placeholder=" ">
      <label>Password</label>
      <span class="toggle-password" onclick="togglePassword()">Show</span>
    </div>

    <button type="submit" id="loginBtn">Login</button>

    <div class="register-link">
      Don’t have an account?
      <a href="{% url 'accounts:register' %}">Register</a>
    </div>

    <div class="footer">
      Secure Access
    </div>
  </form>

  <script>
    function togglePassword() {
      const password = document.getElementById("password");
      const toggle = document.querySelector(".toggle-password");

      if (password.type === "password") {
        password.type = "text";
        toggle.textContent = "Hide";
      } else {
        password.type = "password";
        toggle.textContent = "Show";
      }
    }

    function handleLogin(form) {
      const btn = document.getElementById("loginBtn");
      btn.textContent = "Logging in...";
      btn.classList.add("loading");
    }
  </script>

</body>
</html>
